<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>"뉘앙스" 글리프 듀엣 — 그래픽 스코어</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Datatype:wght@100..900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/quiple/galmuri/dist/galmuri.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/style-score.css" />
  <!-- 관객 폰 참여용 QR 생성(부호 탭 모드에서 사용). 없어도 퍼포머 전용으로 동작. -->
  <script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs/qrcode.min.js"></script>
</head>
<body class="theme-score">
  <div id="stage">
    <!-- 픽셀 캐릭터는 캔버스에 그린다. 그래픽 스코어 테마에선 배경 없이 흰 화면. -->
    <canvas id="scene"></canvas>

    <!-- ===== 화면들 (DOM 오버레이) ===== -->

    <!-- 1. 타이틀 -->
    <section id="screen-title" class="screen active">
      <p class="subtitle">"Nuance" Glyph Duet</p>
      <button class="btn icon big" data-action="start" aria-label="게임 시작" title="게임 시작 · Start">▶</button>
    </section>

    <!-- 2. 캐릭터 소개 — 슬롯머신. 레버를 내릴 때마다 다음 캐릭터가 차례로 소개된다 -->
    <section id="screen-select" class="screen">
      <div id="slot-machine">
        <div id="slot-stack">
          <div id="slot-title">소개 · MEET</div>
          <div id="slot-window"><canvas id="dex-stage" width="128" height="128"></canvas></div>
          <div id="slot-name"></div>
          <div id="slot-count">0 / 4</div>
        </div>
        <div id="slot-lever-mount"><button id="slot-lever" data-action="slot-pull" aria-label="레버 당기기" title="레버를 당겨 캐릭터 소개 · Pull"></button></div>
      </div>
      <div id="dex-grid"></div>
      <button class="btn icon" id="slot-start" data-action="to-setup" aria-label="대화 시작" title="대화 시작 · Talk">▶</button>
    </section>

    <!-- 4. 대화(플레이) -->
    <section id="screen-play" class="screen">
      <div id="connection">
        <span id="conn-label">소통 · Rapport</span>
        <div id="conn-bar"><div id="conn-fill"></div></div>
        <span id="conn-state">…</span>
        <span id="conn-count">0/0</span>
      </div>
      <!-- 좌/우 캐릭터 선택 열 (클릭해서 게임 중 교체). 스코어: 캐릭터마다 옆에 선물이 붙는다 -->
      <div id="pick-col-0" class="pick-col p1"></div>
      <div id="pick-col-1" class="pick-col p2"></div>
      <!-- 라운드 비트 동그라미 — 박마다 하나씩 차오른다 -->
      <div id="round-gauge" class="hidden">
        <span id="round-dur">8박</span>
        <div id="beat-dots"></div>
      </div>
      <!-- 라운드 마치기 — 사이클 동안 보임. 누르면 선물·연주로 -->
      <button id="round-stop" class="btn icon hidden" data-action="round-stop" aria-label="라운드 마치기" title="라운드 마치고 선물·연주로 · Finish">■</button>
      <!-- 예비박(카운트인) 오버레이 — 매 라운드 앞 4·3·2·1 -->
      <div id="countin" class="hidden">
        <span id="countin-num">4</span>
        <span id="countin-label">다음 32초 · ready</span>
      </div>
      <!-- 중앙 스코어 패널 — 대화가 검은 기호로 흰 화면에 그려진다 -->
      <div id="score-panel">
        <div id="score-title"></div>
        <div id="conversation"></div>
      </div>
      <div id="input-bar">
        <div id="input-line"><span id="input-text"></span><span id="caret">▌</span></div>
      </div>
      <!-- 뉘앙스 투표 패드 — 8초 라운드 동안. 퍼포머·관객이 6개 부호에 투표 -->
      <div id="mark-bar" class="hidden">
        <button class="mark-key" data-action="mark-tap" data-mark="period"    title="담담하게 · plainly"><span class="mk-sym">.</span><span class="mk-ct">0</span></button>
        <button class="mark-key" data-action="mark-tap" data-mark="question"  title="되묻듯 · questioning"><span class="mk-sym">?</span><span class="mk-ct">0</span></button>
        <button class="mark-key" data-action="mark-tap" data-mark="bang"      title="힘주어 · emphatic"><span class="mk-sym">!</span><span class="mk-ct">0</span></button>
        <button class="mark-key" data-action="mark-tap" data-mark="ellipsis"  title="머뭇거리며 · trailing"><span class="mk-sym">…</span><span class="mk-ct">0</span></button>
        <button class="mark-key" data-action="mark-tap" data-mark="tilde"     title="물결치듯 · playful"><span class="mk-sym">~</span><span class="mk-ct">0</span></button>
        <button class="mark-key" data-action="mark-tap" data-mark="semicolon" title="망설이듯 · suspended"><span class="mk-sym">;</span><span class="mk-ct">0</span></button>
      </div>
      <!-- 선물 단계 — 라운드가 끝나면 등장. 서로 선물을 주고받고 ▶로 엔딩 -->
      <div id="gift-bar" class="hidden">
        <span id="gift-hint">이제 선물을 주고받으세요</span>
        <button class="btn icon" data-action="to-ending" aria-label="연주로" title="연주 듣기 · Play the score">▶</button>
      </div>
      <!-- 관객 폰 참여 QR — 라운드 동안만 보임 -->
      <div id="mark-qr" class="hidden">
        <div id="mark-qr-code"></div>
        <div id="mark-qr-cap">QR로 함께 · Scan to join</div>
      </div>
      <!-- 인스타 라이브 하트처럼 떠오르는 부호 아이콘 레이어 -->
      <div id="heart-layer"></div>
    </section>

    <!-- 5. 엔딩 -->
    <section id="screen-ending" class="screen">
      <h2 id="ending-title" class="screen-title">…</h2>
      <p id="ending-desc" class="screen-desc"></p>
      <div id="ending-meter"><div id="ending-fill"></div></div>
      <p id="ending-stat" class="hint"></p>
      <div class="row">
        <button class="btn icon" data-action="replay-score" aria-label="악보 다시 듣기" title="악보 다시 듣기 · Replay">↺</button>
        <button class="btn icon big" data-action="restart" aria-label="다시 하기" title="다시 하기 · Play Again">↻</button>
      </div>
    </section>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
