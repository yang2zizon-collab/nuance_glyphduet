<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>"뉘앙스" 글리프 듀엣 — 입장</title>
  <!-- 고정 입구 페이지(GitHub Pages) — QR은 언제나 이 주소.
       현재 공연 터널 주소를 GitHub(tunnel_url.json)에서 읽어 자동으로 이어준다.
       터널이 재발급돼 주소가 바뀌어도 QR은 그대로 유효하다. -->
  <style>
    html, body { margin: 0; height: 100%; background: #fff; color: #111; font-family: ui-monospace, Menlo, monospace; }
    .wrap { height: 100%; display: grid; place-items: center; text-align: center; }
    .mark { font-size: 46px; line-height: 1; animation: bre 2.4s ease-in-out infinite; }
    @keyframes bre { 0%, 100% { opacity: 0.55; } 50% { opacity: 1; } }
    p { margin: 8px 0 0; font-size: 15px; }
    .sub { color: #777; font-size: 12px; }
  </style>
</head>
<body>
  <div class="wrap"><div>
    <div class="mark">✳</div>
    <p id="msg">공연장 찾는 중…</p>
    <p class="sub" id="sub">connecting to the performance</p>
  </div></div>
  <script>
    // 주소 소스 2중화 — jsDelivr(push 직후 퍼지 → 수 초 내 신선) 우선, raw(최대 ~5분 캐시) 백업
    var SRCS = [
      'https://yang2zizon-collab.github.io/nuance_glyphduet/tunnel_url.json',   // Pages 자체 서빙 — 푸시 후 ~20-60초, 캐시 레이스 없음(1순위)
      'https://cdn.jsdelivr.net/gh/yang2zizon-collab/nuance_glyphduet@main/tunnel_url.json',
      'https://raw.githubusercontent.com/yang2zizon-collab/nuance_glyphduet/main/tunnel_url.json',
    ];
    var msg = document.getElementById('msg'), sub = document.getElementById('sub');
    function readJson(src) {
      return fetch(src + '?t=' + Date.now(), { cache: 'no-store' }).then(function (r) { return r.json(); }).catch(function () { return null; });
    }
    function alive(base) {   // /config 200이 확인된 주소로만 이동 — 죽은 주소(1033)로는 절대 안 보낸다
      return Promise.race([
        fetch(base + '/config', { cache: 'no-store' }).then(function (r) { return r.ok; }).catch(function () { return false; }),
        new Promise(function (res) { setTimeout(function () { res(false); }, 4000); }),
      ]);
    }
    function tryOnce() {
      return Promise.all(SRCS.map(readJson)).then(function (js) {
        var cands = [];
        js.forEach(function (j) {
          if (j && j.url && /^https?:\/\//.test(String(j.url))) {
            var t = String(j.url).replace(/\/+$/, '');
            if (cands.indexOf(t) < 0) cands.push(t);
          }
        });
        return cands.reduce(function (p, c) {
          return p.then(function (done) {
            if (done) return true;
            return alive(c).then(function (ok) {
              if (ok) { location.replace(c + '/tap.html'); return true; }
              return false;
            });
          });
        }, Promise.resolve(false));
      });
    }
    // 루프는 절대 죽지 않는다(예외도 다음 시도 예약) + 5회(≈25초) 실패마다 페이지 자체를
    // 새로고침 — "수동 새로고침하면 됐다"를 자동화(스크립트·CDN 상태가 어떻든 리셋).
    var N0 = +(sessionStorage.getItem('goN') || 0);
    (function loop(n) {
      var next = function (done) {
        if (done) { sessionStorage.removeItem('goN'); return; }
        var total = N0 + n + 1;
        msg.textContent = '공연 준비 중 — 서버를 기다립니다';
        sub.textContent = '자동 재확인 중 (' + total + ') · keep this page open';
        if ((n + 1) % 5 === 0) {
          sessionStorage.setItem('goN', String(total));
          location.replace(location.pathname + '?r=' + Date.now());   // 셀프 새로고침(캐시 우회)
          return;
        }
        setTimeout(function () { loop(n + 1); }, 5000);
      };
      tryOnce().then(next, function () { next(false); });
    })(0);
  </script>
</body>
</html>
