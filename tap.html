<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#ffffff" />
  <title>뉘앙스 — 부호 탭</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Datatype:wght@100..900&display=swap" rel="stylesheet" />
  <style>
    :root { --ink: #000; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; margin: 0; }
    body {
      background: #fff; color: var(--ink);
      font-family: 'Datatype', system-ui, sans-serif;
      display: flex; flex-direction: column;
      padding: env(safe-area-inset-top) 14px env(safe-area-inset-bottom);
      user-select: none; -webkit-user-select: none;
      touch-action: manipulation;
    }
    header { text-align: center; padding: 16px 0 8px; }
    header h1 { font-size: 18px; margin: 0; letter-spacing: 0.04em; }
    header p { font-size: 12px; color: #777; margin: 4px 0 0; }
    #pad {
      flex: 1 1 auto;
      display: grid; grid-template-columns: 1fr 1fr; grid-auto-rows: 1fr; gap: 10px;
      padding: 12px 0 16px;
    }
    .key {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 6px;
      background: #fff; color: #000;
      border: 3px solid #000; border-radius: 2px;
      box-shadow: 5px 5px 0 #000;
      font-family: 'Datatype', monospace;
      cursor: pointer; transition: transform .05s ease, box-shadow .05s ease, background .08s ease;
    }
    .key .sym { font-size: 8.5vh; line-height: 0.9; font-weight: 700; }
    .key .cap { font-size: 13px; color: #555; }
    .key.hit { transform: translate(5px, 5px); box-shadow: none; background: #000; color: #fff; }
    .key.hit .cap { color: #ccc; }
    footer { text-align: center; font-size: 11px; color: #999; padding: 4px 0 10px; min-height: 16px; }
    #status.off { color: #c00; }
  </style>
</head>
<body>
  <header>
    <h1 id="title">"뉘앙스" 부호 탭</h1>
    <p id="subtitle">마음에 드는 말투를 눌러 악보에 얹어 주세요</p>
  </header>
  <div id="pad">
    <button class="key" data-mark="period"><span class="sym">.</span><span class="cap">담담하게</span></button>
    <button class="key" data-mark="question"><span class="sym">?</span><span class="cap">되묻듯</span></button>
    <button class="key" data-mark="bang"><span class="sym">!</span><span class="cap">힘주어</span></button>
    <button class="key" data-mark="ellipsis"><span class="sym">…</span><span class="cap">머뭇거리며</span></button>
    <button class="key" data-mark="tilde"><span class="sym">~</span><span class="cap">물결치듯</span></button>
    <button class="key" data-mark="semicolon"><span class="sym">;</span><span class="cap">망설이듯</span></button>
  </div>
  <!-- 선물 단계 화면 — 메인이 선물 단계로 넘어가면 이 화면으로 바뀐다 -->
  <div id="gift-ui" style="display:none; flex:1 1 auto; flex-direction:column; gap:12px; padding:12px 0 16px;">
    <p id="gift-step" style="margin:0; text-align:center; font-size:15px; color:#333;">누가 선물을 주나요?</p>
    <div id="gift-chars" style="flex:1 1 auto; display:grid; grid-template-columns:1fr 1fr; grid-auto-rows:1fr; gap:10px;"></div>
  </div>
  <footer><span id="status">연결됨</span></footer>

  <script>
    const statusEl = document.getElementById('status');
    const CHARS = [
      ['핑크토마토', '#ff5d8f'],
      ['심해어', '#3a4fa0'],
      ['새', '#ff9d3b'],
      ['생쥐', '#b9a6e8'],
    ];

    function flash(btn) {
      btn.classList.add('hit');
      setTimeout(() => btn.classList.remove('hit'), 110);
      if (navigator.vibrate) { try { navigator.vibrate(18); } catch (e) {} }
    }
    function setStatus(ok, msg) {
      statusEl.textContent = msg;
      statusEl.classList.toggle('off', !ok);
    }
    async function post(path, body) {
      const res = await fetch(path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
        keepalive: true,
      });
      if (!res.ok) throw new Error('http ' + res.status);
    }

    async function tap(mark, btn) {
      flash(btn);
      try { await post('/tap', { mark }); setStatus(true, '연결됨'); }
      catch (e) { setStatus(false, '연결 끊김 — 다시 시도해 주세요'); }
    }

    // 터치/클릭 모두 — 빠른 연타가 끊기지 않게 pointerdown에서 바로 보낸다.
    for (const btn of document.querySelectorAll('.key')) {
      btn.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        tap(btn.dataset.mark, btn);
      });
    }
    // 더블탭 확대 방지
    document.addEventListener('gesturestart', (e) => e.preventDefault());

    // ===== 선물 화면 — 누가 → 누구에게 두 번 눌러 선물을 보낸다 =====
    const padEl = document.getElementById('pad');
    const giftEl = document.getElementById('gift-ui');
    const giftStep = document.getElementById('gift-step');
    const giftChars = document.getElementById('gift-chars');
    const titleEl = document.getElementById('title');
    const subEl = document.getElementById('subtitle');
    let giftGiver = null;

    function charBtn(i, disabled) {
      const [name, color] = CHARS[i];
      const b = document.createElement('button');
      b.className = 'key';
      b.style.borderColor = color;
      b.style.boxShadow = '5px 5px 0 ' + color;
      b.disabled = !!disabled;
      if (disabled) b.style.opacity = '0.3';
      b.innerHTML = '<span class="sym" style="font-size:6vh;color:' + color + '">●</span><span class="cap">' + name + '</span>';
      return b;
    }

    function renderGift() {
      giftChars.innerHTML = '';
      const picking = giftGiver == null;
      giftStep.textContent = picking
        ? '누가 선물을 주나요?'
        : CHARS[giftGiver][0] + ' 님이 — 누구에게 줄까요?';
      for (let i = 0; i < 4; i++) {
        const b = charBtn(i, !picking && i === giftGiver);
        b.addEventListener('pointerdown', async (e) => {
          e.preventDefault();
          if (b.disabled) return;
          flash(b);
          if (picking) { giftGiver = i; renderGift(); return; }
          const giver = giftGiver, recip = i;
          giftGiver = null;
          try {
            await post('/gift', { giver, recip });
            setStatus(true, CHARS[giver][0] + ' → ' + CHARS[recip][0] + ' 선물 전달! 🎁 또 줄 수 있어요');
          } catch (err) { setStatus(false, '전달 실패 — 다시 시도해 주세요'); }
          renderGift();
        });
        giftChars.appendChild(b);
      }
    }

    function setMode(phase) {
      const gift = phase === 'gift';
      padEl.style.display = gift ? 'none' : 'grid';
      giftEl.style.display = gift ? 'flex' : 'none';
      titleEl.textContent = gift ? '"뉘앙스" 선물' : '"뉘앙스" 부호 탭';
      subEl.textContent = gift ? '캐릭터들이 서로에게 선물을 건넵니다' : '마음에 드는 말투를 눌러 악보에 얹어 주세요';
      if (gift) { giftGiver = null; renderGift(); }
    }

    // 서버 SSE로 단계 전환을 받는다(늦게 접속해도 /config의 phase로 맞춘다).
    fetch('/config').then((r) => r.json()).then((c) => { if (c && c.phase) setMode(c.phase); }).catch(() => {});
    try {
      const es = new EventSource('/events');
      es.onmessage = (ev) => {
        let d; try { d = JSON.parse(ev.data); } catch (e) { return; }
        if (d && d.type === 'phase') setMode(d.phase);
      };
      es.onerror = () => {};
    } catch (e) { /* SSE 미지원 — 부호 패드만 */ }
  </script>
</body>
</html>
