<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#ffffff" />
  <title>뉘앙스 — 부호 탭</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Datatype:wght@100..900&display=swap" rel="stylesheet" />
  <style>
    :root { --ink: #000; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; margin: 0; }
    body {
      background: #fff; color: var(--ink);
      font-family: 'Datatype', system-ui, sans-serif;
      display: flex; flex-direction: column;
      padding: env(safe-area-inset-top) 14px env(safe-area-inset-bottom);
      user-select: none; -webkit-user-select: none;
      touch-action: manipulation;
    }
    header { text-align: center; padding: 16px 0 8px; }
    header h1 { font-size: 18px; margin: 0; letter-spacing: 0.04em; }
    header p { font-size: 12px; color: #777; margin: 4px 0 0; }
    #pad {
      flex: 1 1 auto;
      display: grid; grid-template-columns: 1fr 1fr; grid-auto-rows: 1fr; gap: 10px;
      padding: 12px 0 16px;
    }
    .key {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 6px;
      background: #fff; color: #000;
      border: 3px solid #000; border-radius: 2px;
      box-shadow: 5px 5px 0 #000;
      font-family: 'Datatype', monospace;
      cursor: pointer; transition: transform .05s ease, box-shadow .05s ease, background .08s ease;
    }
    .key .sym { font-size: 8.5vh; line-height: 0.9; font-weight: 700; }
    .key .cap { font-size: 13px; color: #555; }
    .key.hit { transform: translate(5px, 5px); box-shadow: none; background: #000; color: #fff; }
    .key.hit .cap { color: #ccc; }
    footer { text-align: center; font-size: 11px; color: #999; padding: 4px 0 10px; min-height: 16px; }
    #status.off { color: #c00; }
  </style>
</head>
<body>
  <header>
    <h1 id="title">"뉘앙스" 글리프 듀엣</h1>
    <p id="subtitle">잠시만 기다려 주세요 · hold on</p>
  </header>
  <!-- 대기 화면 — 라운드(대화 타이핑)가 시작되면 자동으로 부호 패드로 바뀐다 -->
  <div id="wait-ui" style="display:flex; flex:1 1 auto; flex-direction:column; align-items:center; justify-content:center; gap:16px; text-align:center;">
    <div id="wait-mark" style="font-size:46px; line-height:1;">✳</div>
    <p style="font-size:22px; font-weight:700; margin:0;">곧 참여가 시작됩니다</p>
    <p style="font-size:14px; color:#777; margin:0; line-height:1.6;">The performance will begin soon.<br />Keep this screen open — your phone is part of the piece.</p>
  </div>
  <div id="pad" style="display:none;">
    <button class="key" data-mark="period"><span class="sym">.</span></button>
    <button class="key" data-mark="question"><span class="sym">?</span></button>
    <button class="key" data-mark="bang"><span class="sym">!</span></button>
    <button class="key" data-mark="ellipsis"><span class="sym">…</span></button>
    <button class="key" data-mark="tilde"><span class="sym">~</span></button>
    <button class="key" data-mark="semicolon"><span class="sym">;</span></button>
  </div>
  <!-- 선물 단계 화면 — 메인이 선물 단계로 넘어가면 자동으로 이 화면으로 바뀐다 -->
  <div id="gift-ui" style="display:none; flex:1 1 auto; flex-direction:column; gap:10px; padding:8px 0 16px;">
    <!-- 진행 흐름: [주는이] → [받는이] 슬롯이 채워진다 -->
    <!-- (구) 흐름 칩 — 2패널 UI로 대체되어 숨김 -->
    <div id="gift-flow" style="display:none; align-items:center; justify-content:center; gap:10px;">
      <div id="flow-giver" class="flow-slot"></div>
      <span style="font-size:26px; line-height:1;">→</span>
      <div id="flow-recip" class="flow-slot"></div>
    </div>
    <p id="gift-step" style="margin:0; text-align:center; font-size:16px; color:#111; font-weight:600;">① 선물을 주는 캐릭터를 고르세요</p>
    <div id="gift-chars" style="flex:1 1 auto; display:flex; flex-direction:column; gap:10px; overflow-y:auto; padding-bottom:8px;"></div>
    <button id="gift-back" style="display:none; font-size:14px; padding:10px; border:2px solid #999; background:#fff; color:#555;">← 다시 고르기</button>
  </div>
  <style>
    .flow-slot {
      min-width: 118px; height: 44px; display: flex; align-items: center; justify-content: center; gap: 7px;
      border: 2px dashed #aaa; border-radius: 6px; font-size: 14px; color: #999; padding: 0 10px;
    }
    .flow-slot.filled { border-style: solid; color: #000; font-weight: 600; }
    .flow-dot { width: 16px; height: 16px; border-radius: 50%; flex: 0 0 auto; }
    /* ── 선물 2패널 UI — 위: 보내는 이 칩, 아래: 받는 이 카드(품목 표시) ── */
    .gift-lbl { margin: 2px 0 0; font-size: 12px; color: #888; letter-spacing: 0.04em; }
    .giver-row { display: flex; gap: 8px; }
    .giver-chip {
      flex: 1 1 0; display: flex; flex-direction: column; align-items: center; gap: 4px;
      padding: 8px 2px 6px; font-size: 12px; color: #555;
      background: #fff; border: 2px solid #ccc; border-radius: 2px; cursor: pointer;
    }
    .giver-chip.on {
      border-color: var(--cc, #000); box-shadow: 4px 4px 0 var(--cc, #000);
      color: #000; font-weight: 700;
    }
    .recip-card {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px; background: #fff;
      border: 3px solid var(--cc, #000); box-shadow: 5px 5px 0 var(--cc, #000); border-radius: 2px;
      cursor: pointer; text-align: left;
      transition: transform .05s ease, box-shadow .05s ease;
    }
    .recip-card.hit, .recip-card:active { transform: translate(5px, 5px); box-shadow: none; }
    .recip-name { font-size: 17px; font-weight: 700; color: #000; flex: 0 0 auto; }
    .recip-gift { margin-left: auto; font-size: 15px; color: #333; background: #f4f4f4; border: 1px solid #ddd; padding: 4px 8px; border-radius: 2px; }
  </style>
  <!-- 아스키아트 — 공연에서 완성된 부호 그림이 폰 규격에 맞게 뜬다 -->
  <div id="art-ui" style="display:none; flex:1 1 auto; align-items:center; justify-content:center; padding:8px 0 14px;">
    <canvas id="art-cv" style="width:100%; image-rendering:pixelated; border:3px solid #000; box-shadow:5px 5px 0 #000;"></canvas>
  </div>
  <!-- 그래픽 스코어 정지화면 — 합주가 시작되면 자동으로 뜨고, 터치할 때마다 총보에 음표가 태어난다 -->
  <div id="still-ui" style="display:none; flex:1 1 auto; flex-direction:column; gap:10px; padding:8px 0 14px; position:relative;">
    <!-- 비율 고정(찌부 방지: width/height auto + max 제한) — 세로(3:4) 원본이 폰에 세워져 꽉 차게 -->
    <img id="still-img" alt="graphic score" style="display:block; margin:0 auto; max-width:100%; max-height:54vh; width:auto; height:auto; border:3px solid #000; box-shadow:5px 5px 0 #000;" />
    <p id="still-cap" style="margin:0; text-align:center; font-size:14px; color:#222;">오늘의 그래픽 스코어 — <b>화면을 터치하면 음표가 하나 태어납니다</b></p>
    <p id="still-count" style="margin:0; text-align:center; font-size:12px; color:#999;"></p>
    <div id="ripple-layer" style="position:absolute; inset:0; pointer-events:none; overflow:hidden;"></div>
  </div>
  <style>
    @keyframes rip { from { transform: scale(0.25); opacity: 0.95; } to { transform: scale(2.6); opacity: 0; } }
    .rip { position: absolute; width: 64px; height: 64px; margin: -32px 0 0 -32px; border: 3px solid #000; border-radius: 50%; animation: rip 0.7s ease-out forwards; }
    .ripg { position: absolute; margin: -14px 0 0 -8px; font-size: 24px; font-weight: 700; animation: rip 0.95s ease-out forwards; }
  </style>
  <footer>
    <span id="status">연결됨</span>
    <span style="display:block; font-size:9px; color:#c4c4c4; margin-top:2px;">화면이 넘어가지 않으면 새로고침 해주세요 · refresh if stuck</span>
    <span id="build-tag" style="display:block; font-size:8px; color:#e0e0e0; margin-top:1px; font-family:monospace;"></span>
  </footer>

  <!-- 캐릭터 스프라이트 — 메인과 같은 그림을 폰 버튼에도 그린다(라인아트 → 캐릭터 색으로 틴트) -->
  <script type="module">
    import { drawCharacter, setMinimal } from './js/sprites.js';
    setMinimal(true);
    const COLORS = ['#ff5d8f', '#3a4fa0', '#ff9d3b', '#b9a6e8'];
    window.charImg = (i, px = 96) => {
      const cv = document.createElement('canvas'); cv.width = px; cv.height = px;
      const c = cv.getContext('2d');
      c.imageSmoothingEnabled = false;
      drawCharacter(c, i, 0, 0, px, i * 1.3);
      // 어두운 잉크 픽셀만 캐릭터 색으로(흰 눈·별 등은 보존)
      const im = c.getImageData(0, 0, px, px), d = im.data;
      const hex = COLORS[i];
      const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
      for (let k = 0; k < d.length; k += 4) {
        if (d[k + 3] > 0 && d[k] + d[k + 1] + d[k + 2] < 620) { d[k] = r; d[k + 1] = g; d[k + 2] = b; }
      }
      c.putImageData(im, 0, 0);
      cv.style.imageRendering = 'pixelated';
      return cv;
    };
    // 이미 선물 화면이 떠 있으면 캐릭터 그림으로 다시 그린다
    if (window.rerenderGift) window.rerenderGift();
  </script>
  <script>
    const statusEl = document.getElementById('status');
    const CHARS = [
      ['핑크토마토', '#ff5d8f'],
      ['심해어', '#3a4fa0'],
      ['새', '#ff9d3b'],
      ['생쥐', '#b9a6e8'],
    ];

    function flash(btn) {
      btn.classList.add('hit');
      setTimeout(() => btn.classList.remove('hit'), 110);
      if (navigator.vibrate) { try { navigator.vibrate(18); } catch (e) {} }
    }
    function setStatus(ok, msg) {
      statusEl.textContent = msg;
      statusEl.classList.toggle('off', !ok);
    }
    async function post(path, body) {
      const res = await fetch(path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
        keepalive: true,
      });
      if (!res.ok) throw new Error('http ' + res.status);
      return res.json().catch(() => ({}));
    }

    async function tap(mark, btn) {
      flash(btn);
      try { await post('/tap', { mark }); setStatus(true, '연결됨'); }
      catch (e) { setStatus(false, '연결 끊김 — 다시 시도해 주세요'); }
    }

    // 터치/클릭 모두 — 빠른 연타가 끊기지 않게 pointerdown에서 바로 보낸다.
    for (const btn of document.querySelectorAll('.key')) {
      btn.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        tap(btn.dataset.mark, btn);
      });
    }
    // 더블탭 확대 방지
    document.addEventListener('gesturestart', (e) => e.preventDefault());

    // ===== 선물 화면 — [주는이] → [받는이] 흐름이 눈에 보이게 =====
    const padEl = document.getElementById('pad');
    const giftEl = document.getElementById('gift-ui');
    const giftStep = document.getElementById('gift-step');
    const giftChars = document.getElementById('gift-chars');
    const giftBack = document.getElementById('gift-back');
    const flowGiver = document.getElementById('flow-giver');
    const flowRecip = document.getElementById('flow-recip');
    const titleEl = document.getElementById('title');
    const subEl = document.getElementById('subtitle');
    let giftGiver = null;
    let giftLock = false;   // 전송 직후 잠깐 잠금(더블탭 방지)

    // 방향별 선물 품목(메인과 동일) — 전달 확인·받는이 버튼에 품목 이름/아이콘을 보여준다
    const GIFT_NAMES = {
      0: { 1: '모자', 2: '둥지', 3: '액자' },
      1: { 0: '잠수안경', 2: '물방울', 3: '돌미역' },
      2: { 0: '무지개', 1: '구름', 3: '치즈' },
      3: { 0: '용과', 1: '바질', 2: '반지' },
    };
    const GIFT_ICONS = {
      0: { 1: '🎩', 2: '🪺', 3: '🖼️' },
      1: { 0: '🥽', 2: '💧', 3: '🌿' },
      2: { 0: '🌈', 1: '☁️', 3: '🧀' },
      3: { 0: '🍈', 1: '🌱', 2: '💍' },
    };

    // 캐릭터 얼굴 캔버스(모듈이 아직 안 떴으면 색 동그라미로 대체)
    function charFace(i, px) {
      if (window.charImg) {
        const cv = window.charImg(i, px * 2);   // 레티나 또렷하게
        cv.style.width = px + 'px'; cv.style.height = px + 'px';
        return cv;
      }
      const sp = document.createElement('span');
      sp.className = 'flow-dot';
      sp.style.cssText = 'width:' + px + 'px;height:' + px + 'px;background:' + CHARS[i][1];
      return sp;
    }

    // 선물 전송 — 받는이 카드를 누르면 즉시 간다(보낸 뒤에도 보내는 이 선택 유지).
    async function sendGift(giver, recip) {
      if (giftLock || giver == null || recip == null || giver === recip) return;
      giftLock = true;
      const item = (GIFT_NAMES[giver] || {})[recip] || '선물';
      const icon = (GIFT_ICONS[giver] || {})[recip] || '🎁';
      try {
        await post('/gift', { giver, recip });
        giftStep.textContent = icon + ' ' + CHARS[giver][0] + ' → ' + CHARS[recip][0] + ' : ' + item + ' 전달!';
        setStatus(true, '전달했어요 — 또 줄 수 있어요');
      } catch (err) {
        giftStep.textContent = '전달 실패 — 다시 시도해 주세요';
        setStatus(false, '연결 끊김');
      }
      setTimeout(() => { giftLock = false; renderGift(); }, 900);
    }

    // 한 화면 2패널 — 위: 보내는 이(칩 4개, 탭 전환) / 아래: 받는 이 카드 3장(품목 표시, 탭=전송).
    // 단계 전환·뒤로가기·드래그 없이 모든 선택지가 항상 보인다.
    function renderGift() {
      if (giftGiver == null) giftGiver = 0;
      giftStep.textContent = '보내는 캐릭터를 고르고, 받을 캐릭터를 누르세요';
      giftBack.style.display = 'none';
      giftChars.innerHTML = '';
      // ① 보내는 이 줄
      const lbl = document.createElement('p');
      lbl.className = 'gift-lbl'; lbl.textContent = '보내는 이';
      giftChars.appendChild(lbl);
      const row = document.createElement('div');
      row.className = 'giver-row';
      for (let i = 0; i < 4; i++) {
        const [name, color] = CHARS[i];
        const c = document.createElement('button');
        c.className = 'giver-chip' + (i === giftGiver ? ' on' : '');
        c.style.setProperty('--cc', color);
        c.appendChild(charFace(i, 34));
        const nm = document.createElement('span'); nm.textContent = name;
        c.appendChild(nm);
        c.addEventListener('pointerdown', (e) => {
          e.preventDefault();
          if (giftLock || giftGiver === i) return;
          giftGiver = i; flash(c); renderGift();
        });
        row.appendChild(c);
      }
      giftChars.appendChild(row);
      // ② 받는 이 카드 — 이 조합에서 갈 선물을 그대로 보여준다
      const lbl2 = document.createElement('p');
      lbl2.className = 'gift-lbl'; lbl2.textContent = '받는 이 — 누르면 바로 전달';
      giftChars.appendChild(lbl2);
      for (let i = 0; i < 4; i++) {
        if (i === giftGiver) continue;
        const [name, color] = CHARS[i];
        const card = document.createElement('button');
        card.className = 'recip-card';
        card.style.setProperty('--cc', color);
        card.appendChild(charFace(i, 52));
        const mid = document.createElement('span');
        mid.className = 'recip-name'; mid.textContent = name;
        card.appendChild(mid);
        const gi = document.createElement('span');
        gi.className = 'recip-gift';
        gi.textContent = ((GIFT_ICONS[giftGiver] || {})[i] || '🎁') + ' ' + ((GIFT_NAMES[giftGiver] || {})[i] || '선물');
        card.appendChild(gi);
        card.addEventListener('pointerdown', (e) => {
          e.preventDefault();
          if (giftLock) return;
          flash(card);
          sendGift(giftGiver, i);
        });
        giftChars.appendChild(card);
      }
    }
    window.rerenderGift = () => { if (giftEl.style.display !== 'none') renderGift(); };

    // ===== 아스키아트 — 공연에서 완성된 부호 그림을 폰 규격으로 그린다 =====
    const artEl = document.getElementById('art-ui');
    const artCv = document.getElementById('art-cv');
    let artOn = false;

    // 부호의 "느낌"만 남긴 추상 그림 — 메인(js/main.js asciiMaskDraw)과 같은 구도.
    function artMaskDraw(g, mark, w, h) {
      g.clearRect(0, 0, w, h);
      g.fillStyle = '#000'; g.strokeStyle = '#000'; g.lineCap = 'round'; g.lineJoin = 'round';
      const m = Math.min(w, h);
      const rnd = (i) => { const s = Math.sin(i * 127.1 + 311.7) * 43758.5453; return s - Math.floor(s); };
      if (mark === 'tilde') {
        // 물결치듯 — 간섭하며 흐르는 물결 다발
        for (let k = 0; k < 7; k++) {
          g.lineWidth = m * (0.016 + rnd(k) * 0.05);
          g.beginPath();
          for (let x = 0; x <= w; x += 6) {
            const u = x / w;
            const y = h * (0.13 + k * 0.118)
              + Math.sin(u * Math.PI * (1.6 + k * 0.5) + k * 1.7) * h * (0.05 + 0.06 * rnd(k + 9))
              + Math.sin(u * Math.PI * 5.3 + k * 2.1) * h * 0.022;
            x === 0 ? g.moveTo(x, y) : g.lineTo(x, y);
          }
          g.stroke();
        }
      } else if (mark === 'bang') {
        // 힘주어 — 한 점에서 터지는 방사선
        const cx = w * 0.5, cy = h * 0.46;
        g.beginPath(); g.arc(cx, cy, m * 0.085, 0, 7); g.fill();
        for (let i = 0; i < 28; i++) {
          const a = (i / 28) * Math.PI * 2 + rnd(i) * 0.2;
          const r0 = m * (0.13 + rnd(i + 40) * 0.05);
          const r1 = m * (0.24 + rnd(i + 80) * 0.36);
          g.lineWidth = m * (0.012 + rnd(i + 120) * 0.034);
          g.beginPath();
          g.moveTo(cx + Math.cos(a) * r0, cy + Math.sin(a) * r0 * 0.96);
          g.lineTo(cx + Math.cos(a) * r1, cy + Math.sin(a) * r1 * 0.96);
          g.stroke();
          if (rnd(i + 200) > 0.6) {
            const rr = r1 + m * 0.06;
            g.beginPath(); g.arc(cx + Math.cos(a) * rr, cy + Math.sin(a) * rr * 0.96, m * 0.014, 0, 7); g.fill();
          }
        }
      } else if (mark === 'period') {
        // 담담하게 — 무거운 점과 번져가는 파문
        const cx = w * 0.5, cy = h * 0.5;
        g.beginPath(); g.arc(cx, cy, m * 0.12, 0, 7); g.fill();
        for (let k = 1; k <= 4; k++) {
          g.lineWidth = m * (0.052 - k * 0.01);
          g.beginPath(); g.arc(cx, cy, m * (0.12 + k * 0.117), 0, 7); g.stroke();
        }
      } else if (mark === 'ellipsis') {
        // 머뭇거리며 — 흩어지며 잦아드는 점들
        for (let i = 0; i < 36; i++) {
          const u = i / 35;
          const x = w * (0.10 + u * 0.80) + (rnd(i) - 0.5) * w * 0.09;
          const y = h * (0.70 - u * 0.44) + Math.sin(u * Math.PI * 2.4) * h * 0.13 + (rnd(i + 50) - 0.5) * h * 0.09;
          const r = m * (0.078 * (1 - u * 0.82) + 0.009);
          g.beginPath(); g.arc(x, y, r, 0, 7); g.fill();
        }
      } else if (mark === 'semicolon') {
        // 망설이듯 — 허공에서 끊기는 획들과 잠깐의 점
        for (let i = 0; i < 9; i++) {
          const x = w * (0.12 + (i / 8) * 0.76) + (rnd(i) - 0.5) * w * 0.03;
          const y0 = h * (0.05 + rnd(i + 20) * 0.08);
          const len = h * (0.18 + rnd(i + 40) * 0.56);
          const xe = x + (rnd(i + 99) - 0.5) * w * 0.16;
          g.lineWidth = m * (0.02 + rnd(i + 60) * 0.038);
          g.beginPath(); g.moveTo(x, y0);
          g.quadraticCurveTo(x + (rnd(i + 80) - 0.5) * w * 0.10, y0 + len * 0.6, xe, y0 + len);
          g.stroke();
          g.beginPath(); g.arc(xe + (rnd(i + 5) - 0.5) * w * 0.02, y0 + len + h * (0.07 + rnd(i + 7) * 0.05), m * (0.013 + rnd(i + 3) * 0.02), 0, 7); g.fill();
        }
      } else {
        // 되묻듯 — 안으로 말려드는 소용돌이
        const cx = w * 0.5, cy = h * 0.48;
        const TURNS = Math.PI * 6.2;
        g.lineWidth = m * 0.052;
        g.beginPath();
        for (let a = 0; a <= TURNS; a += 0.05) {
          const r = m * 0.47 * Math.pow(1 - a / (TURNS + 0.6), 1.12);
          const x = cx + Math.cos(a - Math.PI / 2) * r;
          const y = cy + Math.sin(a - Math.PI / 2) * r * 0.94;
          a === 0 ? g.moveTo(x, y) : g.lineTo(x, y);
        }
        g.stroke();
        g.beginPath(); g.arc(cx, cy, m * 0.04, 0, 7); g.fill();
      }
    }

    // 완성 후 부호별 "숨쉬기" — 메인(js/main.js asciiMotion)과 같은 수식
    function artMotion(mark, x, y, w, h, tm) {
      const m = Math.min(w, h);
      if (mark === 'tilde') {
        return { dx: Math.sin(y * 0.02 + tm * 0.7) * m * 0.006, dy: Math.sin(x * 0.011 + tm * 1.9) * m * 0.028 + Math.sin(x * 0.031 + tm * 3.1) * m * 0.008 };
      }
      if (mark === 'bang') {
        const cx = w / 2, cy = h * 0.46, rx = x - cx, ry = y - cy;
        const r = Math.hypot(rx, ry) || 1, k = Math.sin(tm * 2.8 - r * 0.02) * m * 0.016;
        return { dx: rx / r * k, dy: ry / r * k };
      }
      if (mark === 'period') {
        const cx = w / 2, cy = h / 2, rx = x - cx, ry = y - cy;
        const r = Math.hypot(rx, ry) || 1, k = Math.sin(r * 0.045 - tm * 2.3) * m * 0.015;
        return { dx: rx / r * k, dy: ry / r * k };
      }
      if (mark === 'ellipsis') return { dx: Math.sin(tm * 0.9 + y * 0.02) * m * 0.014, dy: Math.sin(tm * 1.3 + x * 0.017) * m * 0.02 };
      if (mark === 'semicolon') return { dx: Math.sin(tm * 1.5 + y * 0.01) * m * 0.026 * (y / h), dy: Math.sin(tm * 1.1 + y * 0.02) * m * 0.006 };
      const cx = w / 2, cy = h * 0.48, rx = x - cx, ry = y - cy;
      const r = Math.hypot(rx, ry) || 1, k = Math.sin(tm * 1.5 + r * 0.02) * m * 0.016;
      return { dx: -ry / r * k, dy: rx / r * k };
    }

    let artAnim = 0, artFrame = 0;
    function renderArt(mark, chars) {
      const w = Math.min(720, (artEl.clientWidth || window.innerWidth - 28) * 2);
      const h = Math.floor(w * 1.25);   // 폰 세로 비율
      artCv.width = w; artCv.height = h;
      // 마스크 → 밀도 필드: 진한 곳은 글자 촘촘, 옅은 곳은 작은 점 드문드문
      const mc = document.createElement('canvas'); mc.width = w; mc.height = h;
      const mg = mc.getContext('2d', { willReadFrequently: true });
      artMaskDraw(mg, mark, w, h);
      const img = mg.getImageData(0, 0, w, h).data;
      const cell = Math.max(10, Math.floor(Math.min(w, h) / 42));
      const cs = [...(chars || '·')];
      const rnd2 = (a, b) => { const s2 = Math.sin(a * 12.9898 + b * 78.233) * 43758.5453; return s2 - Math.floor(s2); };
      const targets = [];
      let k = 0;
      for (let y = Math.floor(cell / 2); y < h; y += cell) {
        for (let x = Math.floor(cell / 2); x < w; x += cell) {
          const v = img[(y * w + x) * 4 + 3];
          const hsel = rnd2(x, y);
          if (v > 150) targets.push({ ch: cs[k++ % cs.length], px: Math.round(cell * 1.05), a: 0.95, x, y });
          else if (v > 60) {
            if (hsel > 0.35) targets.push({ ch: cs[k++ % cs.length], px: Math.round(cell * 0.82), a: 0.8, x, y });
            else targets.push({ ch: '·', px: Math.round(cell * 0.7), a: 0.6, x, y });
          } else if (hsel > 0.76) targets.push({ ch: '·', px: Math.round(cell * 0.6), a: 0.4, x, y });
        }
      }
      targets.sort((a, b) => a.px - b.px);   // 폰트 전환 최소화
      cancelAnimationFrame(artAnim);
      const g = artCv.getContext('2d');
      const loop2 = () => {
        if (!artOn) return;
        artAnim = requestAnimationFrame(loop2);
        if ((artFrame++ % 2) === 1) return;   // 30fps — 폰 배터리를 아낀다
        const tm = performance.now() / 1000;
        g.fillStyle = '#fff'; g.fillRect(0, 0, w, h);
        g.fillStyle = '#000'; g.textAlign = 'center'; g.textBaseline = 'middle';
        let curF = '';
        for (const tg of targets) {
          const f = tg.px + 'px monospace';
          if (f !== curF) { g.font = f; curF = f; }
          const mv = artMotion(mark, tg.x, tg.y, w, h, tm);
          g.globalAlpha = tg.a;
          g.fillText(tg.ch, tg.x + mv.dx, tg.y + mv.dy);
        }
        g.globalAlpha = 1;
      };
      loop2();
    }

    function showArt(mark, chars) {
      artOn = true;
      padEl.style.display = 'none';
      giftEl.style.display = 'none';
      document.getElementById('wait-ui').style.display = 'none';
      artEl.style.display = 'flex';
      titleEl.textContent = '"뉘앙스" 스코어';
      subEl.textContent = '오늘의 대화가 하나의 그림이 되었습니다';
      setStatus(true, '연결됨');   // 선물 단계의 "전달했어요…" 문구를 지운다
      requestAnimationFrame(() => renderArt(mark, chars));
    }

    const waitEl = document.getElementById('wait-ui');

    // ===== 그래픽 스코어 정지화면 + 터치로 음표 태어나기 =====
    const stillEl = document.getElementById('still-ui');
    const stillImg = document.getElementById('still-img');
    const stillCount = document.getElementById('still-count');
    let stillOn = false, noteCount = 0, stillLock = 0;
    // 내 음표 색 — 서버가 폰(uid)마다 선착순 배정(골든앵글 파스텔, 메인과 같은 공식).
    // uid는 저장해 두어 재접속해도 같은 색을 유지한다.
    let myUid = null; try { myUid = localStorage.getItem('nuanceUid'); } catch (er) {}
    if (!myUid) {
      myUid = Math.random().toString(36).slice(2, 10);
      try { localStorage.setItem('nuanceUid', myUid); } catch (er) {}
    }
    let myCidx = null;
    // 색 공식 — main.js audPastel과 반드시 동일(골든앵글 색상 + 채도 4사이클 + 밝기 5사이클)
    const AUD_SATS = [74, 52, 90, 63], AUD_LOFF = [0, -9, 7, -4, 12];
    const myColor = (l = 48) => {
      if (myCidx == null) return '#000';
      const h = ((myCidx * 137.508) % 360).toFixed(1);
      const s = AUD_SATS[myCidx % 4];
      const l2 = Math.max(30, Math.min(92, l + AUD_LOFF[myCidx % 5]));
      return 'hsl(' + h + ', ' + s + '%, ' + l2 + '%)';
    };
    // 닉네임 — 형용사+명사 무작위 조합(말이 안 돼도 좋다). cidx로 결정돼 메인 랭킹과 같다.
    // ※ 목록·해시는 main.js(AUD_ADJS/AUD_NOUNS/audNick)와 반드시 동일하게 유지할 것.
    function h32(n) {
      n = Math.imul((n >> 16) ^ n, 0x45d9f3b);
      n = Math.imul((n >> 16) ^ n, 0x45d9f3b);
      n = (n >> 16) ^ n;
      return n < 0 ? -n : n;
    }
    const AUD_ADJS = ['촉촉한', '펄럭이는', '시큰한', '둥근', '재빠른', '노란', '수줍은', '우렁찬', '포근한', '삐딱한', '반짝이는', '졸린', '매콤한', '헐렁한', '단단한', '투명한', '바삭한', '미끄러운', '씩씩한', '나른한', '새콤한', '꼬불꼬불', '두근두근', '어리둥절'];
    const AUD_NOUNS = ['감자', '주전자', '고래', '단추', '우산', '계단', '만두', '로켓', '이불', '문어', '자전거', '고드름', '라디오', '소나기', '도넛', '망원경', '바게트', '스탬프', '풍선', '달팽이', '턱수염', '장화', '메아리', '부엉이'];
    const myNick = () => myCidx == null ? ''
      : AUD_ADJS[h32(myCidx * 7 + 1) % AUD_ADJS.length] + ' ' + AUD_NOUNS[h32(myCidx * 13 + 5) % AUD_NOUNS.length];
    function updateCount() {
      stillCount.innerHTML = myCidx == null
        ? '내가 보탠 음표 ' + noteCount + '개'
        : '<b style="color:' + myColor() + '">● ' + myNick() + '</b> — 내가 보탠 음표 ' + noteCount + '개 · 랭킹에 올라갑니다';
    }
    // stillLive — false면 보기 전용(독주·흰 배경 동안): 터치해도 음표가 안 태어난다.
    // 합주가 시작되면 메인이 live=1 스틸을 다시 올려 그때부터 참여 활성화.
    let stillLive = false;
    let jamShown = false;   // 잼 안내 적용 여부 — 이벤트를 놓쳐도 폴링(/config의 jam)으로 따라잡는다
    function showStill(img, live) {
      stillOn = true; artOn = false; cancelAnimationFrame(artAnim);
      stillLive = !!live;
      padEl.style.display = 'none'; giftEl.style.display = 'none';
      artEl.style.display = 'none'; waitEl.style.display = 'none';
      stillEl.style.display = 'flex';
      stillImg.src = img;
      titleEl.textContent = '"뉘앙스" 스코어';
      const cap = document.getElementById('still-cap');
      if (stillLive) {
        subEl.textContent = '모두의 대화가 합주로 연주되고 있습니다';
        if (cap) cap.innerHTML = '오늘의 그래픽 스코어 — <b>화면을 터치하면 음표가 하나 태어납니다</b>';
      } else {
        subEl.textContent = '독주를 감상하는 중 — 곧 당신 차례가 옵니다';
        if (cap) cap.innerHTML = '오늘의 그래픽 스코어 완성 — <b>합주가 시작되면 터치로 함께 연주해요</b>';
      }
      setStatus(true, '연결됨');   // 선물 단계의 "전달했어요…" 문구를 지운다
    }
    // 합주가 끝나면 — 관객 합주(잼) 안내로 전환
    function jamMode() {
      stillLive = true;   // 잼은 당연히 참여 가능
      jamShown = true;
      if (!stillOn) fetchStill();
      const cap = document.getElementById('still-cap');
      if (cap) cap.innerHTML = '합주가 끝났습니다 — <b>이제 당신의 차례! 터치로 함께 연주하세요</b>';
      subEl.textContent = '관객 합주 — 터치가 곧 음표입니다';
    }
    function fetchStill() {
      fetch('/still').then((r) => r.json()).then((c) => { if (c && c.img) showStill(c.img, c.live); }).catch(() => {});
    }
    stillEl.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      if (!stillLive) return;   // 독주(보기 전용) 동안엔 터치 참여 잠금
      const now = performance.now();
      if (now - stillLock < 180) return;   // 과속 방지
      stillLock = now;
      post('/addnote', { uid: myUid }).then((r) => {
        if (r && r.cidx != null && myCidx == null) { myCidx = r.cidx; updateCount(); }   // 첫 응답에 색 배정
        setStatus(true, '연결됨');
      }).catch(() => setStatus(false, '연결 끊김'));
      noteCount++;
      updateCount();
      if (navigator.vibrate) { try { navigator.vibrate(12); } catch (er) {} }
      const rl = document.getElementById('ripple-layer');
      const rect = stillEl.getBoundingClientRect();
      const rip = document.createElement('div'); rip.className = 'rip';
      rip.style.left = (e.clientX - rect.left) + 'px'; rip.style.top = (e.clientY - rect.top) + 'px';
      if (myCidx != null) rip.style.borderColor = myColor();          // 내 색 리플
      rl.appendChild(rip); setTimeout(() => rip.remove(), 750);
      const gl = document.createElement('div'); gl.className = 'ripg';
      gl.textContent = ['◇', '○', '●', '△', '♪'][noteCount % 5];
      gl.style.left = (e.clientX - rect.left) + 'px'; gl.style.top = (e.clientY - rect.top) + 'px';
      if (myCidx != null) gl.style.color = myColor();                 // 내 색 글리프
      rl.appendChild(gl); setTimeout(() => gl.remove(), 1000);
    });

    let curPhase = null;
    function setMode(phase, replay) {
      // 리플레이(SSE 재접속 따라잡기)·폴링으로 온 'idle'은 그림·스틸 표시 중엔 무시한다.
      // 서버가 재시작되면 phase가 idle로 초기화되는데, 그때마다 연주하던 폰이
      // 대기화면으로 튕기던 문제 — 진짜 리셋은 라이브 방송(replay 없음)으로 온다.
      if (replay && phase === 'idle' && (stillOn || artOn)) return;
      if (phase === 'round' || phase === 'idle') { artOn = false; stillOn = false; jamShown = false; stillLive = false; }   // 새 라운드 — 그림·스틸 내리기
      if (phase === curPhase) return;                             // 같은 단계 반복 알림은 무시(선택 유지)
      curPhase = phase;
      if (artOn || stillOn) return;                               // 그림·스틸은 엔딩 동안 유지
      const gift = phase === 'gift';
      const round = phase === 'round';
      padEl.style.display = round ? 'grid' : 'none';
      giftEl.style.display = gift ? 'flex' : 'none';
      waitEl.style.display = (!gift && !round) ? 'flex' : 'none';   // 라운드 전(대기)·엔딩(그림 없을 때)
      artEl.style.display = 'none';
      stillEl.style.display = 'none';
      titleEl.textContent = gift ? '"뉘앙스" 선물' : round ? '마음에 드는 부호를 눌러주세요.' : '"뉘앙스" 글리프 듀엣';
      subEl.textContent = gift ? '캐릭터들이 서로에게 선물을 건넵니다'
        : round ? '가장 많이 눌린 부호가 음악의 말투가 됩니다'
        : '잠시만 기다려 주세요 · hold on';
      if (gift) { giftGiver = null; giftLock = false; renderGift(); }
    }

    // ===== 단계 자동 동기화 — 새로고침 없이 화면이 따라온다 =====
    // ① SSE(접속 즉시 서버가 현재 단계를 밀어줌 + 실시간 전환)
    // ② 4초 폴링(연결이 끊겨 전환을 놓쳐도 따라잡음)
    // ③ 화면 켜짐/복귀 시 즉시 동기화(폰 잠금 해제 등)
    function syncNow() {
      fetch('/config').then((r) => r.json()).then((c) => {
        if (!c) return;
        // 새 빌드 감지 — 대기 화면일 때만 스스로 새로고침(참여 중엔 방해 안 함)
        if (c.build) {
          if (!window.__buildSeen) window.__buildSeen = c.build;
          else if (c.build !== window.__buildSeen && document.getElementById('wait-ui').style.display !== 'none') { location.reload(); return; }
          const bt = document.getElementById('build-tag');
          if (bt) bt.textContent = 'v' + new Date(window.__buildSeen * 1000).toTimeString().slice(0, 8);
        }
        if (c.phase) setMode(c.phase, true);   // 폴링 = 따라잡기(리플레이 취급)
        // 합주 스틸 따라잡기 — 스틸이 없거나, "보기 전용인데 서버는 활성(live)"이면 다시 받아 무장한다
        // (활성 SSE 한 발을 놓치면 영영 잠긴 채 터치가 안 나가던 문제의 자가 치유)
        if (c.phase === 'ending' && c.hasStill && (!stillOn || (c.stillLive && !stillLive))) fetchStill();
        else if (c.ascii && c.ascii.mark && !artOn && !stillOn) showArt(c.ascii.mark, c.ascii.chars);
        if (c.jam && !jamShown && c.phase === 'ending') jamMode();                 // 잼 개시도 폴링으로 따라잡기
      }).catch(() => {});
    }
    syncNow();
    setInterval(syncNow, 4000);
    document.addEventListener('visibilitychange', () => { if (!document.hidden) syncNow(); });
    try {
      const es = new EventSource('/events');
      es.onmessage = (ev) => {
        let d; try { d = JSON.parse(ev.data); } catch (e) { return; }
        if (!d) return;
        if (d.type === 'phase') setMode(d.phase, !!d.replay);
        else if (d.type === 'still') fetchStill();                        // 합주 시작 — 스코어 정지화면
        else if (d.type === 'jam') jamMode();                             // 합주 끝 — 관객 합주 개시
        else if (d.type === 'ascii' && !artOn && !stillOn) showArt(d.mark, d.chars);
      };
      es.onerror = () => {};
    } catch (e) { /* SSE 미지원 — 폴링만으로 동작 */ }
  </script>
</body>
</html>
