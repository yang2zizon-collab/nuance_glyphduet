<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#ffffff" />
  <title>뉘앙스 — 부호 탭</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Datatype:wght@100..900&display=swap" rel="stylesheet" />
  <style>
    :root { --ink: #000; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; margin: 0; }
    body {
      background: #fff; color: var(--ink);
      font-family: 'Datatype', system-ui, sans-serif;
      display: flex; flex-direction: column;
      padding: env(safe-area-inset-top) 14px env(safe-area-inset-bottom);
      user-select: none; -webkit-user-select: none;
      touch-action: manipulation;
    }
    header { text-align: center; padding: 16px 0 8px; }
    header h1 { font-size: 18px; margin: 0; letter-spacing: 0.04em; }
    header p { font-size: 12px; color: #777; margin: 4px 0 0; }
    #pad {
      flex: 1 1 auto;
      display: grid; grid-template-columns: 1fr 1fr; grid-auto-rows: 1fr; gap: 10px;
      padding: 12px 0 16px;
    }
    .key {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 6px;
      background: #fff; color: #000;
      border: 3px solid #000; border-radius: 2px;
      box-shadow: 5px 5px 0 #000;
      font-family: 'Datatype', monospace;
      cursor: pointer; transition: transform .05s ease, box-shadow .05s ease, background .08s ease;
    }
    .key .sym { font-size: 8.5vh; line-height: 0.9; font-weight: 700; }
    .key .cap { font-size: 13px; color: #555; }
    .key.hit { transform: translate(5px, 5px); box-shadow: none; background: #000; color: #fff; }
    .key.hit .cap { color: #ccc; }
    footer { text-align: center; font-size: 11px; color: #999; padding: 4px 0 10px; min-height: 16px; }
    #status.off { color: #c00; }
  </style>
</head>
<body>
  <header>
    <h1 id="title">"뉘앙스" 부호 탭</h1>
    <p id="subtitle">마음에 드는 말투를 눌러 악보에 얹어 주세요</p>
  </header>
  <!-- 대기 화면 — 라운드(대화 타이핑)가 시작되면 자동으로 부호 패드로 바뀐다 -->
  <div id="wait-ui" style="display:flex; flex:1 1 auto; flex-direction:column; align-items:center; justify-content:center; gap:16px; text-align:center;">
    <div id="wait-mark" style="font-size:46px; line-height:1;">✳</div>
    <p style="font-size:22px; font-weight:700; margin:0;">곧 참여가 시작됩니다</p>
    <p style="font-size:14px; color:#777; margin:0; line-height:1.6;">The performance will begin soon.<br />Keep this screen open — your phone is part of the piece.</p>
  </div>
  <div id="pad" style="display:none;">
    <button class="key" data-mark="period"><span class="sym">.</span><span class="cap">담담하게</span></button>
    <button class="key" data-mark="question"><span class="sym">?</span><span class="cap">되묻듯</span></button>
    <button class="key" data-mark="bang"><span class="sym">!</span><span class="cap">힘주어</span></button>
    <button class="key" data-mark="ellipsis"><span class="sym">…</span><span class="cap">머뭇거리며</span></button>
    <button class="key" data-mark="tilde"><span class="sym">~</span><span class="cap">물결치듯</span></button>
    <button class="key" data-mark="semicolon"><span class="sym">;</span><span class="cap">망설이듯</span></button>
  </div>
  <!-- 선물 단계 화면 — 메인이 선물 단계로 넘어가면 자동으로 이 화면으로 바뀐다 -->
  <div id="gift-ui" style="display:none; flex:1 1 auto; flex-direction:column; gap:10px; padding:8px 0 16px;">
    <!-- 진행 흐름: [주는이] → [받는이] 슬롯이 채워진다 -->
    <div id="gift-flow" style="display:flex; align-items:center; justify-content:center; gap:10px;">
      <div id="flow-giver" class="flow-slot"></div>
      <span style="font-size:26px; line-height:1;">→</span>
      <div id="flow-recip" class="flow-slot"></div>
    </div>
    <p id="gift-step" style="margin:0; text-align:center; font-size:16px; color:#111; font-weight:600;">① 선물을 주는 캐릭터를 고르세요</p>
    <div id="gift-chars" style="flex:1 1 auto; display:grid; grid-template-columns:1fr 1fr; grid-auto-rows:1fr; gap:10px;"></div>
    <button id="gift-back" style="display:none; font-size:14px; padding:10px; border:2px solid #999; background:#fff; color:#555;">← 다시 고르기</button>
  </div>
  <style>
    .flow-slot {
      min-width: 118px; height: 44px; display: flex; align-items: center; justify-content: center; gap: 7px;
      border: 2px dashed #aaa; border-radius: 6px; font-size: 14px; color: #999; padding: 0 10px;
    }
    .flow-slot.filled { border-style: solid; color: #000; font-weight: 600; }
    .flow-dot { width: 16px; height: 16px; border-radius: 50%; flex: 0 0 auto; }
  </style>
  <!-- 아스키아트 — 공연에서 완성된 부호 그림이 폰 규격에 맞게 뜬다 -->
  <div id="art-ui" style="display:none; flex:1 1 auto; align-items:center; justify-content:center; padding:8px 0 14px;">
    <canvas id="art-cv" style="width:100%; image-rendering:pixelated; border:3px solid #000; box-shadow:5px 5px 0 #000;"></canvas>
  </div>
  <footer><span id="status">연결됨</span></footer>

  <!-- 캐릭터 스프라이트 — 메인과 같은 그림을 폰 버튼에도 그린다(라인아트 → 캐릭터 색으로 틴트) -->
  <script type="module">
    import { drawCharacter, setMinimal } from './js/sprites.js';
    setMinimal(true);
    const COLORS = ['#ff5d8f', '#3a4fa0', '#ff9d3b', '#b9a6e8'];
    window.charImg = (i, px = 96) => {
      const cv = document.createElement('canvas'); cv.width = px; cv.height = px;
      const c = cv.getContext('2d');
      c.imageSmoothingEnabled = false;
      drawCharacter(c, i, 0, 0, px, i * 1.3);
      // 어두운 잉크 픽셀만 캐릭터 색으로(흰 눈·별 등은 보존)
      const im = c.getImageData(0, 0, px, px), d = im.data;
      const hex = COLORS[i];
      const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
      for (let k = 0; k < d.length; k += 4) {
        if (d[k + 3] > 0 && d[k] + d[k + 1] + d[k + 2] < 620) { d[k] = r; d[k + 1] = g; d[k + 2] = b; }
      }
      c.putImageData(im, 0, 0);
      cv.style.imageRendering = 'pixelated';
      return cv;
    };
    // 이미 선물 화면이 떠 있으면 캐릭터 그림으로 다시 그린다
    if (window.rerenderGift) window.rerenderGift();
  </script>
  <script>
    const statusEl = document.getElementById('status');
    const CHARS = [
      ['핑크토마토', '#ff5d8f'],
      ['심해어', '#3a4fa0'],
      ['새', '#ff9d3b'],
      ['생쥐', '#b9a6e8'],
    ];

    function flash(btn) {
      btn.classList.add('hit');
      setTimeout(() => btn.classList.remove('hit'), 110);
      if (navigator.vibrate) { try { navigator.vibrate(18); } catch (e) {} }
    }
    function setStatus(ok, msg) {
      statusEl.textContent = msg;
      statusEl.classList.toggle('off', !ok);
    }
    async function post(path, body) {
      const res = await fetch(path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
        keepalive: true,
      });
      if (!res.ok) throw new Error('http ' + res.status);
    }

    async function tap(mark, btn) {
      flash(btn);
      try { await post('/tap', { mark }); setStatus(true, '연결됨'); }
      catch (e) { setStatus(false, '연결 끊김 — 다시 시도해 주세요'); }
    }

    // 터치/클릭 모두 — 빠른 연타가 끊기지 않게 pointerdown에서 바로 보낸다.
    for (const btn of document.querySelectorAll('.key')) {
      btn.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        tap(btn.dataset.mark, btn);
      });
    }
    // 더블탭 확대 방지
    document.addEventListener('gesturestart', (e) => e.preventDefault());

    // ===== 선물 화면 — [주는이] → [받는이] 흐름이 눈에 보이게 =====
    const padEl = document.getElementById('pad');
    const giftEl = document.getElementById('gift-ui');
    const giftStep = document.getElementById('gift-step');
    const giftChars = document.getElementById('gift-chars');
    const giftBack = document.getElementById('gift-back');
    const flowGiver = document.getElementById('flow-giver');
    const flowRecip = document.getElementById('flow-recip');
    const titleEl = document.getElementById('title');
    const subEl = document.getElementById('subtitle');
    let giftGiver = null;
    let giftLock = false;   // 전송 직후 잠깐 잠금(더블탭 방지)

    // 방향별 선물 품목(메인과 동일) — 전달 확인·받는이 버튼에 품목 이름/아이콘을 보여준다
    const GIFT_NAMES = {
      0: { 1: '모자', 2: '둥지', 3: '액자' },
      1: { 0: '잠수안경', 2: '물방울', 3: '돌미역' },
      2: { 0: '무지개', 1: '구름', 3: '치즈' },
      3: { 0: '용과', 1: '바질', 2: '반지' },
    };
    const GIFT_ICONS = {
      0: { 1: '🎩', 2: '🪺', 3: '🖼️' },
      1: { 0: '🥽', 2: '💧', 3: '🌿' },
      2: { 0: '🌈', 1: '☁️', 3: '🧀' },
      3: { 0: '🍈', 1: '🌱', 2: '💍' },
    };

    // 캐릭터 얼굴 캔버스(모듈이 아직 안 떴으면 색 동그라미로 대체)
    function charFace(i, px) {
      if (window.charImg) {
        const cv = window.charImg(i, px * 2);   // 레티나 또렷하게
        cv.style.width = px + 'px'; cv.style.height = px + 'px';
        return cv;
      }
      const sp = document.createElement('span');
      sp.className = 'flow-dot';
      sp.style.cssText = 'width:' + px + 'px;height:' + px + 'px;background:' + CHARS[i][1];
      return sp;
    }

    function slotChip(el, idx, placeholder) {
      if (idx == null) { el.className = 'flow-slot'; el.innerHTML = placeholder; return; }
      const [name, color] = CHARS[idx];
      el.className = 'flow-slot filled';
      el.style.borderColor = color;
      el.innerHTML = '';
      el.appendChild(charFace(idx, 26));
      el.appendChild(document.createTextNode(name));
    }

    function charBtn(i, disabled, giftInfo) {
      const [name, color] = CHARS[i];
      const b = document.createElement('button');
      b.className = 'key';
      b.style.borderColor = color;
      b.style.boxShadow = '5px 5px 0 ' + color;
      b.disabled = !!disabled;
      if (disabled) b.style.opacity = '0.25';
      const face = charFace(i, Math.round(window.innerHeight * 0.11));
      b.appendChild(face);
      const cap = document.createElement('span');
      cap.className = 'cap';
      cap.style.color = color; cap.style.fontWeight = '700';
      cap.textContent = name;
      b.appendChild(cap);
      if (giftInfo) {   // 받는이 고르기 단계 — 이 캐릭터가 받게 될 선물을 미리 보여준다
        const gi = document.createElement('span');
        gi.className = 'cap';
        gi.textContent = giftInfo.icon + ' ' + giftInfo.item;
        b.appendChild(gi);
      }
      return b;
    }

    function renderGift() {
      const picking = giftGiver == null;
      slotChip(flowGiver, giftGiver, '누가');
      slotChip(flowRecip, null, '누구에게');
      giftStep.textContent = picking
        ? '① 선물을 주는 캐릭터를 고르세요'
        : '② ' + CHARS[giftGiver][0] + '의 선물을 받을 캐릭터를 고르세요';
      giftBack.style.display = picking ? 'none' : 'block';
      giftChars.innerHTML = '';
      for (let i = 0; i < 4; i++) {
        const info = !picking && i !== giftGiver
          ? { icon: (GIFT_ICONS[giftGiver] || {})[i] || '🎁', item: (GIFT_NAMES[giftGiver] || {})[i] || '선물' }
          : null;
        const b = charBtn(i, !picking && i === giftGiver, info);
        b.addEventListener('pointerdown', async (e) => {
          e.preventDefault();
          if (b.disabled || giftLock) return;
          flash(b);
          if (picking) { giftGiver = i; renderGift(); return; }
          const giver = giftGiver, recip = i;
          giftLock = true;
          slotChip(flowRecip, recip, '');
          const item = (GIFT_NAMES[giver] || {})[recip] || '선물';
          const icon = (GIFT_ICONS[giver] || {})[recip] || '🎁';
          try {
            await post('/gift', { giver, recip });
            giftStep.textContent = icon + ' ' + CHARS[giver][0] + ' → ' + CHARS[recip][0] + ' : ' + item + ' 전달!';
            setStatus(true, '전달했어요 — 또 줄 수 있어요');
          } catch (err) {
            giftStep.textContent = '전달 실패 — 다시 시도해 주세요';
            setStatus(false, '연결 끊김');
          }
          setTimeout(() => { giftGiver = null; giftLock = false; renderGift(); }, 1500);
        });
        giftChars.appendChild(b);
      }
    }
    window.rerenderGift = () => { if (giftEl.style.display !== 'none') renderGift(); };
    giftBack.addEventListener('pointerdown', (e) => { e.preventDefault(); if (!giftLock) { giftGiver = null; renderGift(); } });

    // ===== 아스키아트 — 공연에서 완성된 부호 그림을 폰 규격으로 그린다 =====
    const artEl = document.getElementById('art-ui');
    const artCv = document.getElementById('art-cv');
    let artOn = false;

    // 부호의 "느낌"만 남긴 추상 그림 — 메인(js/main.js asciiMaskDraw)과 같은 구도.
    function artMaskDraw(g, mark, w, h) {
      g.clearRect(0, 0, w, h);
      g.fillStyle = '#000'; g.strokeStyle = '#000'; g.lineCap = 'round'; g.lineJoin = 'round';
      const m = Math.min(w, h);
      const rnd = (i) => { const s = Math.sin(i * 127.1 + 311.7) * 43758.5453; return s - Math.floor(s); };
      if (mark === 'tilde') {
        // 물결치듯 — 간섭하며 흐르는 물결 다발
        for (let k = 0; k < 7; k++) {
          g.lineWidth = m * (0.016 + rnd(k) * 0.05);
          g.beginPath();
          for (let x = 0; x <= w; x += 6) {
            const u = x / w;
            const y = h * (0.13 + k * 0.118)
              + Math.sin(u * Math.PI * (1.6 + k * 0.5) + k * 1.7) * h * (0.05 + 0.06 * rnd(k + 9))
              + Math.sin(u * Math.PI * 5.3 + k * 2.1) * h * 0.022;
            x === 0 ? g.moveTo(x, y) : g.lineTo(x, y);
          }
          g.stroke();
        }
      } else if (mark === 'bang') {
        // 힘주어 — 한 점에서 터지는 방사선
        const cx = w * 0.5, cy = h * 0.46;
        g.beginPath(); g.arc(cx, cy, m * 0.085, 0, 7); g.fill();
        for (let i = 0; i < 28; i++) {
          const a = (i / 28) * Math.PI * 2 + rnd(i) * 0.2;
          const r0 = m * (0.13 + rnd(i + 40) * 0.05);
          const r1 = m * (0.24 + rnd(i + 80) * 0.36);
          g.lineWidth = m * (0.012 + rnd(i + 120) * 0.034);
          g.beginPath();
          g.moveTo(cx + Math.cos(a) * r0, cy + Math.sin(a) * r0 * 0.96);
          g.lineTo(cx + Math.cos(a) * r1, cy + Math.sin(a) * r1 * 0.96);
          g.stroke();
          if (rnd(i + 200) > 0.6) {
            const rr = r1 + m * 0.06;
            g.beginPath(); g.arc(cx + Math.cos(a) * rr, cy + Math.sin(a) * rr * 0.96, m * 0.014, 0, 7); g.fill();
          }
        }
      } else if (mark === 'period') {
        // 담담하게 — 무거운 점과 번져가는 파문
        const cx = w * 0.5, cy = h * 0.5;
        g.beginPath(); g.arc(cx, cy, m * 0.12, 0, 7); g.fill();
        for (let k = 1; k <= 4; k++) {
          g.lineWidth = m * (0.052 - k * 0.01);
          g.beginPath(); g.arc(cx, cy, m * (0.12 + k * 0.117), 0, 7); g.stroke();
        }
      } else if (mark === 'ellipsis') {
        // 머뭇거리며 — 흩어지며 잦아드는 점들
        for (let i = 0; i < 36; i++) {
          const u = i / 35;
          const x = w * (0.10 + u * 0.80) + (rnd(i) - 0.5) * w * 0.09;
          const y = h * (0.70 - u * 0.44) + Math.sin(u * Math.PI * 2.4) * h * 0.13 + (rnd(i + 50) - 0.5) * h * 0.09;
          const r = m * (0.078 * (1 - u * 0.82) + 0.009);
          g.beginPath(); g.arc(x, y, r, 0, 7); g.fill();
        }
      } else if (mark === 'semicolon') {
        // 망설이듯 — 허공에서 끊기는 획들과 잠깐의 점
        for (let i = 0; i < 9; i++) {
          const x = w * (0.12 + (i / 8) * 0.76) + (rnd(i) - 0.5) * w * 0.03;
          const y0 = h * (0.05 + rnd(i + 20) * 0.08);
          const len = h * (0.18 + rnd(i + 40) * 0.56);
          const xe = x + (rnd(i + 99) - 0.5) * w * 0.16;
          g.lineWidth = m * (0.02 + rnd(i + 60) * 0.038);
          g.beginPath(); g.moveTo(x, y0);
          g.quadraticCurveTo(x + (rnd(i + 80) - 0.5) * w * 0.10, y0 + len * 0.6, xe, y0 + len);
          g.stroke();
          g.beginPath(); g.arc(xe + (rnd(i + 5) - 0.5) * w * 0.02, y0 + len + h * (0.07 + rnd(i + 7) * 0.05), m * (0.013 + rnd(i + 3) * 0.02), 0, 7); g.fill();
        }
      } else {
        // 되묻듯 — 안으로 말려드는 소용돌이
        const cx = w * 0.5, cy = h * 0.48;
        const TURNS = Math.PI * 6.2;
        g.lineWidth = m * 0.052;
        g.beginPath();
        for (let a = 0; a <= TURNS; a += 0.05) {
          const r = m * 0.47 * Math.pow(1 - a / (TURNS + 0.6), 1.12);
          const x = cx + Math.cos(a - Math.PI / 2) * r;
          const y = cy + Math.sin(a - Math.PI / 2) * r * 0.94;
          a === 0 ? g.moveTo(x, y) : g.lineTo(x, y);
        }
        g.stroke();
        g.beginPath(); g.arc(cx, cy, m * 0.04, 0, 7); g.fill();
      }
    }

    function renderArt(mark, chars) {
      const w = Math.min(720, (artEl.clientWidth || window.innerWidth - 28) * 2);
      const h = Math.floor(w * 1.25);   // 폰 세로 비율
      artCv.width = w; artCv.height = h;
      const g = artCv.getContext('2d', { willReadFrequently: true });
      g.fillStyle = '#fff'; g.fillRect(0, 0, w, h);
      // 마스크 → 글자 앉히기
      const mc = document.createElement('canvas'); mc.width = w; mc.height = h;
      const mg = mc.getContext('2d', { willReadFrequently: true });
      artMaskDraw(mg, mark, w, h);
      const img = mg.getImageData(0, 0, w, h).data;
      const cell = Math.max(12, Math.floor(Math.min(w, h) / 34));
      g.fillStyle = '#000'; g.textAlign = 'center'; g.textBaseline = 'middle';
      g.font = (cell * 1.05).toFixed(0) + 'px monospace';
      let k = 0;
      const cs = [...(chars || '·')];
      for (let y = Math.floor(cell / 2); y < h; y += cell) {
        for (let x = Math.floor(cell / 2); x < w; x += cell) {
          if (img[(y * w + x) * 4 + 3] > 128) {
            g.fillText(cs[k % cs.length], x, y); k++;
          }
        }
      }
    }

    function showArt(mark, chars) {
      artOn = true;
      padEl.style.display = 'none';
      giftEl.style.display = 'none';
      document.getElementById('wait-ui').style.display = 'none';
      artEl.style.display = 'flex';
      titleEl.textContent = '"뉘앙스" 스코어';
      subEl.textContent = '오늘의 대화가 하나의 그림이 되었습니다';
      requestAnimationFrame(() => renderArt(mark, chars));
    }

    const waitEl = document.getElementById('wait-ui');
    let curPhase = null;
    function setMode(phase) {
      if (phase === 'round' || phase === 'idle') artOn = false;   // 새 라운드 — 그림 내리기
      if (phase === curPhase) return;                             // 같은 단계 반복 알림은 무시(선택 유지)
      curPhase = phase;
      if (artOn) return;                                          // 그림은 엔딩 동안 유지
      const gift = phase === 'gift';
      const round = phase === 'round';
      padEl.style.display = round ? 'grid' : 'none';
      giftEl.style.display = gift ? 'flex' : 'none';
      waitEl.style.display = (!gift && !round) ? 'flex' : 'none';   // 라운드 전(대기)·엔딩(그림 없을 때)
      artEl.style.display = 'none';
      titleEl.textContent = gift ? '"뉘앙스" 선물' : round ? '"뉘앙스" 부호 탭' : '"뉘앙스" 글리프 듀엣';
      subEl.textContent = gift ? '캐릭터들이 서로에게 선물을 건넵니다'
        : round ? '마음에 드는 말투를 눌러 악보에 얹어 주세요'
        : '잠시만 기다려 주세요 · hold on';
      if (gift) { giftGiver = null; giftLock = false; renderGift(); }
    }

    // ===== 단계 자동 동기화 — 새로고침 없이 화면이 따라온다 =====
    // ① SSE(접속 즉시 서버가 현재 단계를 밀어줌 + 실시간 전환)
    // ② 4초 폴링(연결이 끊겨 전환을 놓쳐도 따라잡음)
    // ③ 화면 켜짐/복귀 시 즉시 동기화(폰 잠금 해제 등)
    function syncNow() {
      fetch('/config').then((r) => r.json()).then((c) => {
        if (!c) return;
        if (c.phase) setMode(c.phase);
        if (c.ascii && c.ascii.mark && !artOn) showArt(c.ascii.mark, c.ascii.chars);
      }).catch(() => {});
    }
    syncNow();
    setInterval(syncNow, 4000);
    document.addEventListener('visibilitychange', () => { if (!document.hidden) syncNow(); });
    try {
      const es = new EventSource('/events');
      es.onmessage = (ev) => {
        let d; try { d = JSON.parse(ev.data); } catch (e) { return; }
        if (!d) return;
        if (d.type === 'phase') setMode(d.phase);
        else if (d.type === 'ascii' && !artOn) showArt(d.mark, d.chars);
      };
      es.onerror = () => {};
    } catch (e) { /* SSE 미지원 — 폴링만으로 동작 */ }
  </script>
</body>
</html>
